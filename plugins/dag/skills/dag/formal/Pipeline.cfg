\* Pipeline.cfg — TLC configuration for Pipeline.tla
\* Run from plugins/dag/skills/dag/ (the SKILL dir, where formal/ lives — the formal/… paths
\* below resolve there, NOT in a run dir), with a real JDK on JAVA_HOME (see formal-models.md):
\*   "$JAVA_HOME/bin/java" -cp /tmp/tla2tools.jar tlc2.TLC \
\*       -config formal/Pipeline.cfg formal/Pipeline.tla
\* tla2tools.jar (TLC) is a BUILD tool, not a skill file; it is fetched to /tmp,
\* NOT vendored into the repo. Download URL is documented in formal-models.md.

CONSTANT MaxRetries = 2
CONSTANT MaxFuel = 2

\* SPECIFICATION carries the fairness (WF on the loop) needed for the liveness check.
SPECIFICATION Spec

\* Safety invariants (checked in every reachable state):
INVARIANT TypeOK
INVARIANT GateOrdering
INVARIANT LoopBound
INVARIANT VariantOK
INVARIANT BackEdgeGuarded
INVARIANT FuelBound

\* Liveness (temporal) properties — bounded-loop termination + bounded-amendment quiescence:
PROPERTY Termination
PROPERTY Quiesce
