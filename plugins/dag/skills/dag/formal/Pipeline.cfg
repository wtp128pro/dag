\* Pipeline.cfg — TLC configuration for Pipeline.tla
\* Run (from the run dir), with a real JDK on JAVA_HOME (see formal-models.md):
\*   "$JAVA_HOME/bin/java" -cp /tmp/tla2tools.jar tlc2.TLC \
\*       -config formal/Pipeline.cfg formal/Pipeline.tla
\* tla2tools.jar (TLC) is a BUILD tool, not a skill file; it is fetched to /tmp,
\* NOT vendored under staged/skill/. Download URL is documented in formal-models.md.

CONSTANT MaxRetries = 2

\* SPECIFICATION carries the fairness (WF on the loop) needed for the liveness check.
SPECIFICATION Spec

\* Safety invariants (checked in every reachable state):
INVARIANT TypeOK
INVARIANT GateOrdering
INVARIANT LoopBound
INVARIANT VariantOK
INVARIANT BackEdgeGuarded

\* Liveness (temporal) property — bounded-loop termination:
PROPERTY Termination
